appId: com.allansargeant.atemfleetadmin
productName: ATEM Fleet Admin
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  notarize: false
win:
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  artifactName: ${name}-${version}-${arch}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  category: AudioVideo
  maintainer: Allan Sargeant <allan.sargeant@gmail.com>
  target:
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]
    - target: AppImage
      arch: [x64, arm64]
npmRebuild: false
publish: null
